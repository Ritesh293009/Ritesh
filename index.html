<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritesh Computer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    /* Light, multi-colour theme — each service / area gets its own hue */
    --bg:#f6f4ef; --surface:#ffffff; --surface2:#f1eee6; --border:#e6e1d6;
    --text:#221d12; --muted:#7c7565;

    /* Brand */
    --brand1:#ff7a45;  /* warm orange  */
    --brand2:#2563eb;  /* blue         */
    --brand3:#16a34a;  /* green        */
    --brand4:#9333ea;  /* purple       */
    --brand5:#e11d48;  /* rose         */
    --brand6:#0d9488;  /* teal         */

    --accent:#ff7a45; --accent2:#ffb085; --accent-deep:#e8601f;
    --success:#16a34a; --danger:#e11d48; --info:#2563eb;
    --radius:18px; --radius-sm:12px;
    --shadow:0 10px 30px rgba(40,30,10,.10);
  }
  body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;}
  h1,h2,h3,.brand,.page-title,.content-title{font-family:'Baloo 2',system-ui,sans-serif;}
  .hidden{display:none !important;}
  button{font-family:inherit;}

  /* ── Topbar ─────────────────────────────────────────────────────────── */
  .topbar{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;box-shadow:0 1px 0 rgba(0,0,0,.02);}
  .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.15rem;letter-spacing:-.01em;color:var(--text);}
  .brand .mark{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--brand1),var(--brand5));display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 4px 12px rgba(255,122,69,.35);}
  .brand span{color:var(--brand2);}
  .hamburger{background:var(--surface2);border:1px solid var(--border);width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);}
  .hamburger:hover{background:var(--border);}
  .topbar-right{display:flex;align-items:center;gap:10px;}
  .topbar-user{font-size:.78rem;color:var(--muted);text-align:right;line-height:1.3;}
  .topbar-user strong{display:block;color:var(--text);font-size:.85rem;}

  /* ── Side menu ──────────────────────────────────────────────────────── */
  .overlay{position:fixed;inset:0;background:rgba(20,15,5,.4);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s;}
  .overlay.open{opacity:1;pointer-events:auto;}
  .sidemenu{position:fixed;top:0;left:-300px;width:280px;height:100%;background:var(--surface);border-right:1px solid var(--border);z-index:301;transition:left .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;padding:22px 0;box-shadow:var(--shadow);}
  .sidemenu.open{left:0;}
  .sm-header{padding:0 22px 18px;border-bottom:1px solid var(--border);margin-bottom:10px;}
  .sm-avatar{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--brand1),var(--brand5));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.2rem;color:#fff;margin-bottom:10px;}
  .sm-name{font-weight:700;font-size:1rem;}
  .sm-mobile{font-size:.8rem;color:var(--muted);}
  .sm-item{display:flex;align-items:center;gap:12px;padding:13px 22px;color:var(--text);cursor:pointer;font-size:.92rem;font-weight:600;transition:background .15s;}
  .sm-item:hover{background:var(--surface2);}
  .sm-item.danger{color:var(--danger);margin-top:auto;border-top:1px solid var(--border);}

  main{max-width:760px;margin:0 auto;padding:22px 16px 80px;}

  /* ── Login screen ───────────────────────────────────────────────────── */
  #loginScreen{min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:38px 30px;width:100%;max-width:400px;box-shadow:var(--shadow);}
  .login-logo{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,var(--brand1),var(--brand5));display:flex;align-items:center;justify-content:center;font-size:1.7rem;margin:0 auto 18px;box-shadow:0 8px 22px rgba(255,122,69,.35);}
  .login-card h1{text-align:center;font-size:1.5rem;margin-bottom:4px;color:var(--text);}
  .login-card .sub{text-align:center;color:var(--muted);font-size:.85rem;margin-bottom:26px;}
  .field{margin-bottom:16px;text-align:left;}
  .field label{display:block;font-size:.76rem;font-weight:700;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.04em;}
  .field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;font-size:1rem;color:var(--text);outline:none;transition:border-color .15s,box-shadow .15s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand2);box-shadow:0 0 0 3px rgba(37,99,235,.13);background:var(--surface);}
  .phone-row{display:flex;gap:8px;}
  .cc{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0 14px;display:flex;align-items:center;font-weight:700;font-size:.95rem;min-width:62px;justify-content:center;}
  .err-text{color:var(--danger);font-size:.8rem;min-height:18px;margin-bottom:8px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:var(--radius-sm);font-size:.95rem;font-weight:700;cursor:pointer;border:none;transition:all .18s;width:100%;}
  .btn-accent{background:linear-gradient(135deg,var(--brand1),var(--accent-deep));color:#fff;}
  .btn-accent:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 8px 22px rgba(255,122,69,.4);}
  .btn-accent:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
  .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
  .btn-ghost:hover{background:var(--border);}
  .btn-outline{background:transparent;border:1.5px solid var(--brand2);color:var(--brand2);}

  /* ── Sections / cards ───────────────────────────────────────────────── */
  .page-title{font-size:1.4rem;font-weight:800;margin-bottom:4px;color:var(--text);}
  .page-sub{color:var(--muted);font-size:.85rem;margin-bottom:22px;}
  .back-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;cursor:pointer;color:var(--muted);font-size:.85rem;font-weight:600;}
  .back-row:hover{color:var(--brand2);}

  .service-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:480px){.service-grid{grid-template-columns:1fr;}}
  .service-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;border-top:4px solid var(--card-color,var(--brand1));}
  .service-card:hover{transform:translateY(-3px);box-shadow:var(--shadow);}
  .service-icon{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.45rem;margin-bottom:14px;background:var(--card-color-soft,#fff0e8);}
  .service-card h3{font-size:1rem;margin-bottom:4px;color:var(--text);}
  .service-card p{font-size:.78rem;color:var(--muted);margin-bottom:10px;line-height:1.4;}
  .service-price{font-size:.82rem;font-weight:800;color:var(--card-color,var(--brand1));}

  .option-row{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
  .option-pill{flex:1;min-width:120px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center;cursor:pointer;font-size:.88rem;font-weight:700;transition:all .15s;color:var(--text);}
  .option-pill.selected{border-color:var(--brand2);background:rgba(37,99,235,.08);color:var(--brand2);}

  .upload-box{border:2px dashed var(--border);border-radius:var(--radius-sm);padding:22px 16px;text-align:center;cursor:pointer;position:relative;background:var(--surface2);margin-bottom:14px;transition:all .15s;}
  .upload-box:hover{border-color:var(--brand2);}
  .upload-box input{position:absolute;inset:0;opacity:0;cursor:pointer;}
  .upload-box .ub-label{font-size:.85rem;font-weight:700;margin-bottom:2px;color:var(--text);}
  .upload-box .ub-sub{font-size:.74rem;color:var(--muted);}
  .upload-box.has-file{border-color:var(--success);border-style:solid;background:rgba(22,163,74,.05);}
  .upload-preview{width:100%;max-height:140px;object-fit:contain;border-radius:8px;margin-top:8px;}
  .optional-tag{font-size:.68rem;background:var(--surface2);color:var(--muted);padding:2px 8px;border-radius:99px;margin-left:6px;font-weight:600;border:1px solid var(--border);}

  .checkbox-row{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:16px;cursor:pointer;}
  .checkbox-row input{width:18px;height:18px;accent-color:var(--brand1);}

  .summary-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin:20px 0;}
  .summary-row{display:flex;justify-content:space-between;font-size:.86rem;padding:5px 0;color:var(--muted);}
  .summary-row.total{border-top:1px solid var(--border);margin-top:6px;padding-top:10px;font-weight:800;color:var(--text);font-size:1.05rem;}

  /* ── Payment page ───────────────────────────────────────────────────── */
  .pay-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 24px;text-align:center;}
  .pay-amount{font-size:2.2rem;font-weight:800;color:var(--brand1);margin:10px 0 4px;}
  .pay-orderid{font-size:.78rem;color:var(--muted);margin-bottom:20px;}
  #qrCanvas{background:#fff;padding:14px;border-radius:14px;display:inline-block;margin-bottom:18px;border:1px solid var(--border);}
  .pay-note{font-size:.78rem;color:var(--muted);margin:14px 0;line-height:1.5;}

  /* ── Orders list ────────────────────────────────────────────────────── */
  .order-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;}
  .order-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .order-service{font-weight:700;font-size:.95rem;color:var(--text);}
  .order-id{font-size:.72rem;color:var(--muted);}
  .badge{font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:99px;white-space:nowrap;}
  .badge-pending{background:rgba(37,99,235,.1);color:var(--info);}
  .badge-accepted{background:rgba(22,163,74,.1);color:var(--success);}
  .badge-rejected{background:rgba(225,29,72,.1);color:var(--danger);}
  .badge-completed{background:rgba(255,122,69,.12);color:var(--brand1);}
  .order-meta{font-size:.8rem;color:var(--muted);display:flex;justify-content:space-between;margin-top:8px;}

  /* ── Uploaded Files page ───────────────────────────────────────────── */
  .files-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  @media(max-width:480px){.files-grid{grid-template-columns:repeat(2,1fr);gap:10px;}}
  .file-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;}
  .file-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
  .file-card img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--surface2);}
  .file-card-info{padding:9px 10px;}
  .file-card-label{font-size:.72rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .file-card-sub{font-size:.66rem;color:var(--muted);margin-top:1px;}
  .file-group-title{font-size:.78rem;font-weight:800;color:var(--brand2);text-transform:uppercase;letter-spacing:.03em;margin:22px 0 10px;display:flex;align-items:center;gap:8px;}
  .file-group-title:first-child{margin-top:0;}
  .file-lightbox{position:fixed;inset:0;z-index:600;background:rgba(20,15,5,.85);display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px);}
  .file-lightbox.open{display:flex;}
  .file-lightbox img{max-width:92vw;max-height:88vh;border-radius:14px;box-shadow:var(--shadow);}
  .file-lightbox-close{position:fixed;top:18px;right:18px;background:rgba(255,255,255,.92);border:none;width:42px;height:42px;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-state h3{color:var(--text);margin-bottom:6px;font-size:1.05rem;}

  .toast-container{position:fixed;bottom:20px;right:16px;left:16px;z-index:999;display:flex;flex-direction:column;align-items:center;gap:8px;}
  .toast{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 18px;font-size:.86rem;box-shadow:var(--shadow);max-width:400px;width:100%;text-align:center;animation:up .2s ease;color:var(--text);}
  .toast.success{border-left:3px solid var(--success);}
  .toast.error{border-left:3px solid var(--danger);}
  @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--brand1);border-radius:50%;animation:spin .7s linear infinite;margin:30px auto;}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ════ LOGIN SCREEN ════ -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">💻</div>
    <h1>Ritesh Computer</h1>
    <p class="sub">Apna mobile number daalein</p>

    <div id="step1">
      <div class="field">
        <label>Mobile Number</label>
        <div class="phone-row">
          <div class="cc">🇮🇳 +91</div>
          <input type="tel" id="loginMobile" placeholder="9876543210" maxlength="10" inputmode="numeric"
                 oninput="this.value=this.value.replace(/\D/g,'')" onkeydown="if(event.key==='Enter') checkMobile()">
        </div>
      </div>
      <div class="err-text" id="loginErr1"></div>
      <button class="btn btn-accent" id="checkBtn" onclick="checkMobile()">Continue</button>
    </div>

    <div id="step2" class="hidden">
      <div class="field">
        <label>Aapka Naam</label>
        <input type="text" id="loginName" placeholder="Full name likhein" onkeydown="if(event.key==='Enter') doRegister()">
      </div>
      <div class="err-text" id="loginErr2"></div>
      <button class="btn btn-accent" id="registerBtn" onclick="doRegister()">Submit aur Login Karein</button>
    </div>
  </div>
</div>

<!-- ════ MAIN APP ════ -->
<div id="app" class="hidden">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="hamburger" onclick="openMenu()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="brand"><div class="mark">💻</div>Ritesh <span>Computer</span></div>
    </div>
    <div class="topbar-right">
      <div class="topbar-user"><strong id="topUserName">—</strong><span id="topUserMobile"></span></div>
    </div>
  </div>

  <main id="mainContent"></main>
</div>

<!-- ════ SIDE MENU ════ -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>
<div class="sidemenu" id="sidemenu">
  <div class="sm-header">
    <div class="sm-avatar" id="smAvatar">?</div>
    <div class="sm-name" id="smName">—</div>
    <div class="sm-mobile" id="smMobile"></div>
  </div>
  <div class="sm-item" onclick="goHome()">🏠 &nbsp;Home / Services</div>
  <div class="sm-item" onclick="goMyOrders()">📦 &nbsp;My Orders</div>
  <div class="sm-item" onclick="goUploadedFiles()">🖼️ &nbsp;Uploaded Files</div>
  <div class="sm-item danger" onclick="doLogout()">🚪 &nbsp;Logout</div>
</div>

<!-- ════ FILE LIGHTBOX ════ -->
<div class="file-lightbox" id="fileLightbox" onclick="closeFileLightbox(event)">
  <button class="file-lightbox-close" onclick="closeFileLightbox(event)">✕</button>
  <img id="fileLightboxImg" src="" alt="">
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ════════════════════════════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyF8Ie_z8G1ByLlzbokZHcAZ9ZpezuLXpVG-OLNFGYMJuu5ftI5fGVDWQu_sl6Ye6Up/exec';
const UPI_ID = 'BHARATPE2O0Y0W1R5Z29125@unitype';
const UPI_NAME = 'Ritesh Bharatpay';
const SESSION_KEY = 'csc_session';

let session = null;       // { mobile, name }
let servicesCache = [];
let currentOrderDraft = {}; // build-up object for the form being filled

// ── BOOT ──────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem(SESSION_KEY);
  if (saved) { session = JSON.parse(saved); activateApp(); }
});

// ── LOGIN FLOW ────────────────────────────────────────────────────────────
async function checkMobile() {
  const mobile = document.getElementById('loginMobile').value.trim();
  const err = document.getElementById('loginErr1');
  if (mobile.length !== 10) { err.textContent = 'Sahi 10-digit mobile number daalein.'; return; }
  err.textContent = '';
  setBtnLoading('checkBtn', true, 'Checking...');

  try {
    const res = await fetch(`${SCRIPT_URL}?action=checkUser&mobile=${mobile}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Error');

    if (data.registered) {
      session = { mobile, name: data.name };
      sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
      activateApp();
    } else {
      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.remove('hidden');
      setTimeout(() => document.getElementById('loginName').focus(), 100);
    }
  } catch (e) {
    err.textContent = 'Connection error: ' + e.message;
  } finally {
    setBtnLoading('checkBtn', false, 'Continue');
  }
}

async function doRegister() {
  const mobile = document.getElementById('loginMobile').value.trim();
  const name = document.getElementById('loginName').value.trim();
  const err = document.getElementById('loginErr2');
  if (!name) { err.textContent = 'Naam daalna zaroori hai.'; return; }
  err.textContent = '';
  setBtnLoading('registerBtn', true, 'Submitting...');

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'registerUser', mobile, name })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Error');

    session = { mobile, name: data.name };
    sessionStorage.setItem(SESSION_KEY, JSON.stringify(session));
    activateApp();
  } catch (e) {
    err.textContent = 'Error: ' + e.message;
  } finally {
    setBtnLoading('registerBtn', false, 'Submit aur Login Karein');
  }
}

function setBtnLoading(id, loading, label) {
  const btn = document.getElementById(id);
  btn.disabled = loading;
  btn.textContent = label;
}

function activateApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('topUserName').textContent = session.name;
  document.getElementById('topUserMobile').textContent = '+91 ' + session.mobile;
  document.getElementById('smName').textContent = session.name;
  document.getElementById('smMobile').textContent = '+91 ' + session.mobile;
  document.getElementById('smAvatar').textContent = session.name.charAt(0).toUpperCase();
  goHome();
}

function doLogout() {
  sessionStorage.removeItem(SESSION_KEY);
  session = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('loginMobile').value = '';
  document.getElementById('loginName').value = '';
  closeMenu();
}

// ── SIDE MENU ─────────────────────────────────────────────────────────────
function openMenu(){ document.getElementById('sidemenu').classList.add('open'); document.getElementById('overlay').classList.add('open'); }
function closeMenu(){ document.getElementById('sidemenu').classList.remove('open'); document.getElementById('overlay').classList.remove('open'); }

// ── ROUTER ────────────────────────────────────────────────────────────────
function goHome() { closeMenu(); renderServiceHub(); }
function goMyOrders() { closeMenu(); renderMyOrders(); }
function goUploadedFiles() { closeMenu(); renderUploadedFiles(); }

// ── SERVICE HUB ───────────────────────────────────────────────────────────
const SERVICE_ICONS = {
  photo_print: '🖼️', pvc_card: '🪪', certificate: '📜', pan_card: '💳', udyam: '🏭'
};
const SERVICE_COLORS = {
  photo_print: { main:'#ff7a45', soft:'#fff0e8' },
  pvc_card:    { main:'#2563eb', soft:'#e9f0ff' },
  certificate: { main:'#16a34a', soft:'#e9f8ee' },
  pan_card:    { main:'#9333ea', soft:'#f4ebfd' },
  udyam:       { main:'#e11d48', soft:'#fdebef' }
};

async function renderServiceHub() {
  const main = document.getElementById('mainContent');
  main.innerHTML = `<div class="page-title">Namaste, ${esc(session.name)} 👋</div><div class="page-sub">Service select karein</div><div class="spinner"></div>`;

  try {
    const res = await fetch(`${SCRIPT_URL}?action=getServices`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    servicesCache = data.services;

    let html = `<div class="page-title">Namaste, ${esc(session.name)} 👋</div><div class="page-sub">Service select karein</div><div class="service-grid">`;
    servicesCache.forEach(s => {
      const col = SERVICE_COLORS[s.id] || { main:'#ff7a45', soft:'#fff0e8' };
      html += `
        <div class="service-card" style="--card-color:${col.main};--card-color-soft:${col.soft}" onclick="openService('${esc(s.id)}')">
          <div class="service-icon">${SERVICE_ICONS[s.id] || '📋'}</div>
          <h3>${esc(s.name)}</h3>
          <p>${esc(s.description || '')}</p>
          <div class="service-price">₹${s.basePrice}${Number(s.homeDeliveryPrice)>0 ? ' + ₹'+s.homeDeliveryPrice+' delivery':''}</div>
        </div>`;
    });
    html += `</div>`;
    main.innerHTML = html;
  } catch (e) {
    main.innerHTML = `<div class="empty-state"><h3>⚠️ Error</h3><p>${esc(e.message)}</p></div>`;
  }
}

function openService(id) {
  currentOrderDraft = { service: id, files: {}, details: {} };
  if (id === 'photo_print')  return renderPhotoPrintForm();
  if (id === 'pvc_card')     return renderPvcCardForm();
  if (id === 'certificate')  return renderCertificateForm();
  if (id === 'pan_card')     return renderPanCardForm();
  if (id === 'udyam')        return renderUdyamForm();
}

function getSvc(id) { return servicesCache.find(s => s.id === id) || {}; }

// ── BACK BUTTON HELPER ────────────────────────────────────────────────────
function backRow(label, fn) {
  return `<div class="back-row" onclick="${fn}">← ${label}</div>`;
}

// ── FILE UPLOAD WIDGET (returns HTML, wires change handler) ───────────────
function uploadWidget(key, label, optional=true) {
  return `
    <div class="field">
      <label>${label}${optional ? '<span class="optional-tag">Optional</span>' : ''}</label>
      <div class="upload-box" id="box_${key}">
        <input type="file" accept="image/*" onchange="onFileSelect('${key}', this)">
        <div class="ub-label" id="lbl_${key}">📤 Tap to upload</div>
        <div class="ub-sub">JPG / PNG</div>
        <img class="upload-preview hidden" id="prev_${key}">
      </div>
    </div>`;
}

async function onFileSelect(key, input) {
  const file = input.files[0];
  if (!file) return;
  const box = document.getElementById(`box_${key}`);
  const lbl = document.getElementById(`lbl_${key}`);
  const prev = document.getElementById(`prev_${key}`);

  lbl.textContent = '⏳ Uploading...';

  try {
    const { b64, mime } = await fileToBase64(file);
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'uploadFile', name: file.name, mime, data: b64, mobile: session.mobile })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    currentOrderDraft.files[key] = { fileId: data.fileId, url: data.url, name: data.name };
    box.classList.add('has-file');
    lbl.textContent = '✅ ' + file.name;
    prev.src = data.thumb;
    prev.classList.remove('hidden');
    toast('Uploaded: ' + file.name, 'success');
  } catch (e) {
    lbl.textContent = '❌ Upload failed';
    toast('Upload error: ' + e.message, 'error');
  }
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const b64 = reader.result.split(',')[1];
      resolve({ b64, mime: file.type || 'image/jpeg' });
    };
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.readAsDataURL(file);
  });
}

// ── OPTION PILL WIDGET ────────────────────────────────────────────────────
function pillGroup(groupKey, options, onSelectFn) {
  let html = `<div class="option-row" id="grp_${groupKey}">`;
  options.forEach(opt => {
    html += `<div class="option-pill" data-val="${esc(opt)}" onclick="${onSelectFn}('${groupKey}','${esc(opt)}', this)">${esc(opt)}</div>`;
  });
  html += `</div>`;
  return html;
}
function selectPill(groupKey, val, el) {
  document.querySelectorAll(`#grp_${groupKey} .option-pill`).forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
  currentOrderDraft.details[groupKey] = val;
}

// ── DELIVERY TOGGLE ───────────────────────────────────────────────────────
function toggleDelivery(rowEl) {
  const chk = rowEl.querySelector('input[type=checkbox]');
  chk.checked = !chk.checked;
  currentOrderDraft.homeDelivery = chk.checked;
  recalcSummary(currentOrderDraft.service);
}

// ── SUMMARY + SUBMIT BLOCK ────────────────────────────────────────────────
function summaryAndSubmit(serviceId) {
  return `
    <div class="summary-box" id="summaryBox"></div>
    <button class="btn btn-accent" onclick="submitOrder('${serviceId}')">Submit Order</button>
  `;
}

function calcAmount(serviceId) {
  const svc = getSvc(serviceId);
  let base = Number(svc.basePrice) || 0;
  let delivery = 0;

  if (serviceId === 'certificate') {
    if (currentOrderDraft.details.certType === 'Character Certificate') base += 50;
  }
  if (currentOrderDraft.homeDelivery) {
    delivery = Number(svc.homeDeliveryPrice) || 0;
  }
  return { base, delivery, total: base + delivery };
}

function recalcSummary(serviceId) {
  const box = document.getElementById('summaryBox');
  if (!box) return;
  const { base, delivery, total } = calcAmount(serviceId);
  box.innerHTML = `
    <div class="summary-row"><span>Service Charge</span><span>₹${base}</span></div>
    ${delivery > 0 ? `<div class="summary-row"><span>Home Delivery</span><span>₹${delivery}</span></div>` : ''}
    <div class="summary-row total"><span>Total Amount</span><span>₹${total}</span></div>
  `;
}

// Recalc summary on every relevant interaction
document.addEventListener('click', () => { if (currentOrderDraft.service) recalcSummary(currentOrderDraft.service); });
document.addEventListener('input', () => { if (currentOrderDraft.service) recalcSummary(currentOrderDraft.service); });

// ── SUBMIT ORDER ───────────────────────────────────────────────────────────
async function submitOrder(serviceId) {
  const { base, delivery, total } = calcAmount(serviceId);

  // Build subtype/extra fields based on service
  let subtype = '';
  if (serviceId === 'photo_print') subtype = currentOrderDraft.details.photoType || '';
  if (serviceId === 'certificate')  subtype = currentOrderDraft.details.certType || '';

  const payload = {
    action: 'placeOrder',
    mobile: session.mobile,
    name: session.name,
    service: serviceId,
    subtype,
    details: currentOrderDraft.details,
    files: currentOrderDraft.files,
    baseAmount: base,
    deliveryAmount: delivery,
    homeDelivery: !!currentOrderDraft.homeDelivery
  };

  const main = document.getElementById('mainContent');
  const prevHtml = main.innerHTML;
  main.innerHTML = '<div class="spinner"></div><p style="text-align:center;color:var(--muted)">Order place ho raha hai...</p>';

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Order failed');

    renderPaymentPage(data.orderId, data.totalAmount, data.upiLink);
  } catch (e) {
    main.innerHTML = prevHtml;
    toast('Error: ' + e.message, 'error');
  }
}

}

// MY ORDERS

async function renderMyOrders() {
  const main = document.getElementById('mainContent');
  main.innerHTML = `<div class="page-title">📦 My Orders</div><div class="spinner"></div>`;

  try {
    const res = await fetch(`${SCRIPT_URL}?action=getMyOrders&mobile=${session.mobile}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    if (!data.orders.length) {
      main.innerHTML = `<div class="page-title">📦 My Orders</div><div class="empty-state"><h3>Koi order nahi mila</h3><p>Service select karke order karein</p></div>`;
      return;
    }

    let html = `<div class="page-title">📦 My Orders</div>`;
    data.orders.forEach(o => {
      const badgeClass = {
        'Pending':'badge-pending','Accepted':'badge-accepted',
        'Rejected':'badge-rejected','Completed':'badge-completed'
      }[o.status] || 'badge-pending';

      html += `
        <div class="order-card">
          <div class="order-top">
            <div>
              <div class="order-service">${esc(serviceLabel(o.service))} ${o.subtype ? '· '+esc(o.subtype) : ''}</div>
              <div class="order-id">${esc(o.orderId)}</div>
            </div>
            <span class="badge ${badgeClass}">${esc(o.status)}</span>
          </div>
          <div class="order-meta">
            <span>₹${o.totalAmount} · ${esc(o.paymentStatus)}</span>
            <span>${new Date(o.createdAt).toLocaleDateString()}</span>
          </div>
        </div>`;
    });
    main.innerHTML = html;
  } catch (e) {
    main.innerHTML = `<div class="empty-state"><h3>⚠️ Error</h3><p>${esc(e.message)}</p></div>`;
  }
}

function serviceLabel(id) {
  const labels = { photo_print:'Photo Print', pvc_card:'PVC Card Print', certificate:'Certificate', pan_card:'Pan Card', udyam:'Udyam Registration' };
  return labels[id] || id;
}

// UPLOADED FILES — every file the user has ever uploaded, grouped by order
// ════════════════════════════════════════════════════════════════════════
const FIELD_LABELS = {
  photo:'Photo', front:'Front Image', back:'Back Image',
  aadharFront:'Aadhar Front', aadharBack:'Aadhar Back',
  ror:'ROR Copy', tenthCert:'10th Certificate', voterCard:'Voter Card',
  passbook:'Bank Passbook'
};

async function renderUploadedFiles() {
  const main = document.getElementById('mainContent');
  main.innerHTML = `<div class="page-title">🖼️ Uploaded Files</div><div class="page-sub">Aapke saare uploaded documents aur photos</div><div class="spinner"></div>`;

  try {
    const res = await fetch(`${SCRIPT_URL}?action=getMyOrders&mobile=${session.mobile}`);
    const data = await res.json();
    if (!data.success) throw new Error(data.error);

    // Build a flat list of { url, thumb, label, orderId, service, date }
    const allFiles = [];
    data.orders.forEach(o => {
      let files = {};
      try { files = JSON.parse(o.files || '{}'); } catch(e) {}
      Object.keys(files).forEach(key => {
        const f = files[key];
        if (!f || !f.fileId) return;
        allFiles.push({
          fileId: f.fileId,
          url: f.url || `https://drive.google.com/uc?export=view&id=${f.fileId}`,
          thumb: `https://drive.google.com/thumbnail?id=${f.fileId}&sz=w400`,
          label: FIELD_LABELS[key] || key,
          orderId: o.orderId,
          service: o.service,
          date: o.createdAt
        });
      });
    });

    if (!allFiles.length) {
      main.innerHTML = `<div class="page-title">🖼️ Uploaded Files</div><div class="empty-state"><h3>Koi file upload nahi hui</h3><p>Jab aap koi order karenge to uploaded documents yahan dikhenge</p></div>`;
      return;
    }

    // Group by orderId, newest order first
    const byOrder = {};
    allFiles.forEach(f => { (byOrder[f.orderId] = byOrder[f.orderId] || []).push(f); });
    const orderIds = Object.keys(byOrder).sort((a,b) => new Date(byOrder[b][0].date) - new Date(byOrder[a][0].date));

    let html = `<div class="page-title">🖼️ Uploaded Files</div><div class="page-sub">${allFiles.length} files across ${orderIds.length} orders</div>`;

    orderIds.forEach(oid => {
      const group = byOrder[oid];
      const dateStr = new Date(group[0].date).toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'});
      html += `<div class="file-group-title">${esc(serviceLabel(group[0].service))} · ${esc(oid)} · ${dateStr}</div><div class="files-grid">`;
      group.forEach(f => {
        html += `
          <div class="file-card" onclick="openFileLightbox('${esc(f.url)}')">
            <img src="${esc(f.thumb)}" alt="${esc(f.label)}" loading="lazy" onerror="this.src='${esc(f.url)}'">
            <div class="file-card-info">
              <div class="file-card-label">${esc(f.label)}</div>
              <div class="file-card-sub">${esc(oid)}</div>
            </div>
          </div>`;
      });
      html += `</div>`;
    });

    main.innerHTML = html;
  } catch (e) {
    main.innerHTML = `<div class="empty-state"><h3>⚠️ Error</h3><p>${esc(e.message)}</p></div>`;
  }
}

function openFileLightbox(url) {
  document.getElementById('fileLightboxImg').src = url;
  document.getElementById('fileLightbox').classList.add('open');
}
function closeFileLightbox(e) {
  if (e.target.id === 'fileLightbox' || e.target.classList.contains('file-lightbox-close')) {
    document.getElementById('fileLightbox').classList.remove('open');
  }
}

// ── TOAST ──────────────────────────────────────────────────────────────────
function toast(msg, type='success') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
